<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteering in Austria</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Volunteering in Austria</h1>
        <p class="sub">click a federal state on the map. switch the metric with the dropdown.</p>
    </header>

    <div class="controls">
        <label for="metric">metric:</label>
        <select id="metric"></select>
        <span class="hint">colour scale updates per metric</span>
    </div>

    <main>
        <div id="map"></div>

        <aside id="panel">
            <h2 id="panel-state">pick a state</h2>
            <p class="muted" id="panel-hint">or hover the map to preview</p>
            <div id="panel-numbers"></div>
            <div id="panel-chart"></div>
        </aside>
    </main>

    <footer>
        <small>data: my own collection from austrian volunteering survey reports. boundaries: data.gv.at "laender_999_geo".</small>
    </footer>

    <script src="script.js"></script>
</body>
</html>
